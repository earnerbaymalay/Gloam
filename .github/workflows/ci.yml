name: Gloam CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_TOOL_OPTIONS: -Xmx4g
  GRADLE_OPTS: -Dorg.gradle.parallel=true

jobs:
  # ── Android Build ──
  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Debug file structure
        run: |
          ls -R
          find . -name "gradle-wrapper.jar"
          file gradle/wrapper/gradle-wrapper.jar

      - name: Build debug APK
        run: |
          ./gradlew composeApp:assembleDebug --no-daemon --stacktrace
          mkdir -p build-artifacts
          find composeApp/build/outputs/apk/debug -name "*.apk" -exec cp {} build-artifacts/gloam.apk \; -quit

      - name: Build release APK (unsigned)
        run: |
          ./gradlew composeApp:assembleRelease --no-daemon --stacktrace
          # find composeApp/build/outputs/apk/release -name "*.apk" -exec cp {} build-artifacts/gloam-release-unsigned.apk \; -quit
        continue-on-error: true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-android-apk
          path: build-artifacts/gloam.apk
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-test-results
          path: '**/build/test-results/test/'
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-lint-report
          path: '**/build/reports/lint-results-debug.html'
          retention-days: 14

  # ── Desktop Linux Build ──
  desktop-linux:
    name: Desktop Linux (deb)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Linux deb package
        run: ./gradlew composeApp:createDistributable composeApp:packageDeb --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload deb package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-desktop-linux-deb
          path: composeApp/build/compose/binaries/main-deb/*.deb
          retention-days: 30

      - name: Upload distributable archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-desktop-linux-dir
          path: composeApp/build/compose/binaries/main/app/
          retention-days: 30

  # ── Create GitHub Release ──
  release:
    name: Create Release
    needs: [android, desktop-linux]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} (Build ${{ github.run_number }})
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('latest-build-{0}', github.run_number) }}
          files: |
            artifacts/**/*.apk
            artifacts/**/*.deb
            artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
