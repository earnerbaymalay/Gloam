name: Gloam CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_TOOL_OPTIONS: -Xmx4g
  GRADLE_OPTS: -Dorg.gradle.parallel=true

jobs:
  # ── Android Build ──
  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew composeApp:assembleDebug --no-daemon --stacktrace
          mkdir -p build-artifacts
          find composeApp/build/outputs/apk/debug -name "*.apk" -exec cp {} build-artifacts/gloam.apk \; -quit

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-android-apk
          path: build-artifacts/gloam.apk
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-test-results
          path: '**/build/test-results/test/'
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-lint-report
          path: '**/build/reports/lint-results-debug.html'
          retention-days: 14

  # ── Desktop Linux Build ──
  desktop-linux:
    name: Desktop Linux (deb)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Linux deb package
        run: ./gradlew composeApp:createDistributable composeApp:packageDeb --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload deb package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-desktop-linux-deb
          path: composeApp/build/compose/binaries/main-deb/*.deb
          retention-days: 30

      - name: Upload distributable archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gloam-desktop-linux-dir
          path: composeApp/build/compose/binaries/main/app/
          retention-days: 30

  # ── Create GitHub Release ──
  release:
    name: Create Release
    needs: [android]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: gloam-android-apk
          path: artifacts/android

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Build {0}', github.run_number) }}
          files: artifacts/**/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') && github.event_name != 'workflow_dispatch' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
