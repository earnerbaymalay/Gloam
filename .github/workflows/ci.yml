name: Gloam CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_TOOL_OPTIONS: -Xmx4g
  GRADLE_OPTS: -Dorg.gradle.parallel=true

jobs:
  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gloam-debug-${{ github.sha }}
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 14

  desktop:
    name: Desktop Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Desktop (deb)
        run: ./gradlew :composeApp:packageDeb
        continue-on-error: true

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: gloam-desktop-deb-${{ github.sha }}
          path: composeApp/build/compose/binaries/main/deb/*.deb
          retention-days: 14

  release:
    name: Create Release
    needs: [android, desktop]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: gloam-debug-${{ github.sha }}
          path: artifacts

      - name: Download Desktop deb
        uses: actions/download-artifact@v4
        with:
          name: gloam-desktop-deb-${{ github.sha }}
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Build {0}', github.run_number) }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') && github.event_name != 'workflow_dispatch' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
