name: Build & Test — Compose Multiplatform

on:
  push:
    branches: [ main, feature/cmp-migration ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: gloam-android-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  desktop:
    name: Desktop JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:packageDistributionForCurrentOS --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: gloam-desktop-linux
          path: app/build/compose/binaries/main/**/*
          retention-days: 7

  ios:
    name: iOS Framework
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:linkDebugFrameworkIosSimulatorArm64 --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: gloam-ios-framework
          path: app/build/bin/iosSimulatorArm64/debugFramework/
          retention-days: 7

  web:
    name: Web (Wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:wasmJsBrowserDistribution --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: gloam-web-wasm
          path: app/build/dist/wasmJs/productionExecutable/
          retention-days: 7

  all-platforms:
    name: All Platforms OK
    needs: [ android, desktop, ios, web ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.android.result }}" != "success" || \
                "${{ needs.desktop.result }}" != "success" || \
                "${{ needs.ios.result }}" != "success" || \
                "${{ needs.web.result }}" != "success" ]]; then
            echo "One or more platform builds failed"; exit 1
          fi
          echo "All platform builds passed"
